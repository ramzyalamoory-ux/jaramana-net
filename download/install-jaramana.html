<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جرمانا نت - تحميل التطبيق</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(to left, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .btn-dark {
            background: #334155;
            color: white;
            border: 1px solid #475569;
        }
        .info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: right;
        }
        .info h3 {
            color: #60a5fa;
            margin-bottom: 10px;
        }
        .info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .footer {
            margin-top: 30px;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="http://47.242.228.72:81/logo.png" alt="جرمانا نت" class="logo">
        
        <h1>جرمانا نت</h1>
        <p class="subtitle">JaraMana Net</p>
        
        <a href="http://47.242.228.72:81" class="btn btn-primary">
            🌐 فتح الموقع الآن
        </a>
        
        <a href="http://47.242.228.72:81/jaramana-net.zip" class="btn btn-secondary">
            📥 تحميل ملف المشروع
        </a>
        
        <div class="info">
            <h3>🔐 بيانات الدخول:</h3>
            <p>المستخدم: <strong>admin</strong></p>
            <p>كلمة السر: <strong>admin12344321</strong></p>
        </div>
        
        <div class="info">
            <h3>📞 أرقام الدعم:</h3>
            <p>Ghasan: 0992417870</p>
            <p>Ramzy: 0959128944</p>
        </div>
        
        <p class="footer">By Eng Ramzy Amoory 🚀</p>
    </div>
</body>
</html>
